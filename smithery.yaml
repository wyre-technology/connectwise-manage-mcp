# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - cwManageUrl
      - cwManageCompanyId
      - cwManagePublicKey
      - cwManagePrivateKey
      - cwManageClientId
    properties:
      cwManageUrl:
        type: string
        description: Your ConnectWise Manage instance URL
      cwManageCompanyId:
        type: string
        description: Your ConnectWise Manage company ID
      cwManagePublicKey:
        type: string
        description: Your ConnectWise Manage API public key
      cwManagePrivateKey:
        type: string
        description: Your ConnectWise Manage API private key
      cwManageClientId:
        type: string
        description: Your ConnectWise Manage API client ID
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { CW_MANAGE_URL: config.cwManageUrl, CW_MANAGE_COMPANY_ID: config.cwManageCompanyId, CW_MANAGE_PUBLIC_KEY: config.cwManagePublicKey, CW_MANAGE_PRIVATE_KEY: config.cwManagePrivateKey, CW_MANAGE_CLIENT_ID: config.cwManageClientId, MCP_TRANSPORT: 'stdio' } })
